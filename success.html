<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to AI4Teachers &mdash; Access Your Courses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,800;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --slate: #1e293b;
    --navy: #0f172a;
    --cream: #fdf8f0;
    --warm-white: #fefcf8;
    --amber: #f59e0b;
    --amber-dark: #d97706;
    --amber-light: #fbbf24;
    --sage: #6b9080;
    --sage-light: #a7c4bc;
    --pencil: #4b5563;
    --paper: #f5f0e8;
    --red: #ef4444;
    --font-display: 'Fraunces', serif;
    --font-hand: 'Caveat', cursive;
    --font-body: 'DM Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    color: var(--slate);
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  /* Ruled lines background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      transparent,
      transparent 39px,
      rgba(180,160,140,0.08) 39px,
      rgba(180,160,140,0.08) 40px
    );
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 680px;
    width: 100%;
    background: white;
    border-radius: 24px;
    padding: 3rem;
    border: 1.5px solid rgba(30,41,59,0.08);
    box-shadow: 0 16px 48px rgba(0,0,0,0.04);
    position: relative;
    z-index: 1;
  }
  .success-check {
    width: 68px; height: 68px;
    background: var(--amber);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 16px rgba(245,158,11,0.3);
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.8rem;
    color: var(--navy);
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }
  h1 em {
    font-family: var(--font-display);
    font-style: italic;
    color: var(--amber-dark);
  }
  .subtitle {
    color: var(--pencil);
    font-size: 1rem;
    margin-bottom: 2rem;
    line-height: 1.6;
  }
  .courses-section h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.15rem;
    color: var(--navy);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .course-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.2rem;
    background: rgba(245,158,11,0.04);
    border: 1.5px solid rgba(245,158,11,0.15);
    border-radius: 12px;
    margin-bottom: 0.75rem;
    transition: all 0.3s;
  }
  .course-card:hover {
    border-color: var(--amber);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(245,158,11,0.1);
  }
  .course-info {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .course-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: rgba(245,158,11,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }
  .course-name {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--navy);
  }
  .course-desc {
    font-size: 0.78rem;
    color: var(--pencil);
    margin-top: 0.15rem;
  }
  .join-btn {
    background: var(--amber);
    color: var(--navy);
    border: none;
    padding: 0.55rem 1.1rem;
    border-radius: 8px;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(245,158,11,0.2);
  }
  .join-btn:hover {
    background: var(--amber-dark);
    color: white;
  }
  .setup-section {
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1.5px solid rgba(30,41,59,0.06);
  }
  .setup-section h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.15rem;
    color: var(--navy);
    margin-bottom: 0.8rem;
  }
  .step-list {
    list-style: none;
    counter-reset: steps;
  }
  .step-list li {
    counter-increment: steps;
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    padding: 0.5rem 0;
    font-size: 0.92rem;
    color: var(--pencil);
    line-height: 1.5;
  }
  .step-list li::before {
    content: counter(steps);
    width: 26px; height: 26px;
    background: rgba(245,158,11,0.1);
    color: var(--amber-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }
  .hand-note {
    font-family: var(--font-hand);
    color: var(--sage);
    font-size: 1.1rem;
    margin-top: 1.5rem;
    transform: rotate(-1deg);
    display: inline-block;
  }
  .email-note {
    margin-top: 2rem;
    padding: 1rem 1.2rem;
    background: rgba(107,144,128,0.06);
    border: 1.5px solid rgba(107,144,128,0.15);
    border-radius: 12px;
    font-size: 0.88rem;
    color: var(--pencil);
    line-height: 1.6;
  }
  .email-note strong { color: var(--sage); }
  .loading {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--pencil);
    font-size: 1rem;
  }
  .error-msg {
    background: #fef2f2;
    border: 1.5px solid #fecaca;
    border-radius: 12px;
    padding: 1.2rem;
    color: #991b1b;
    font-size: 0.9rem;
    margin-top: 1rem;
    line-height: 1.6;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--amber-dark);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    margin-top: 1.5rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--amber); }
  @media (max-width: 640px) {
    .container { padding: 2rem 1.5rem; }
    .course-card { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
    .join-btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<div class="container" id="content">
  <div class="loading" id="loading">
    <p>Verifying your purchase...</p>
  </div>
</div>

<script>
const COURSE_ICONS = {
  'course-1': '&#x1F4DD;',
  'course-2': '&#x1F3D7;',
  'course-3': '&#x1F4CA;',
  'course-4': '&#x267F;',
  'course-5': '&#x1F4BC;',
  '12-week-course': '&#x1F4DA;',
};

const PRODUCT_LABELS = {
  'certification-bundle': 'AI Teacher Certification &mdash; Full Bundle',
  '12-week-course': '12-Week Course',
  'course-1': 'Course 1',
  'course-2': 'Course 2',
  'course-3': 'Course 3',
  'course-4': 'Course 4',
  'course-5': 'Course 5',
  'monthly-subscription': 'AI4Teachers Pro &mdash; Monthly',
  'annual-subscription': 'AI4Teachers Pro &mdash; Annual',
};

(async () => {
  const container = document.getElementById('content');

  // Get session ID from URL
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');

  if (!sessionId) {
    container.innerHTML = `
      <div class="success-check" style="background: var(--pencil);">&#x26A0;&#xFE0F;</div>
      <h1>No purchase found</h1>
      <p class="subtitle">It looks like you arrived here without completing a purchase. Head back to get started.</p>
      <a href="/" class="back-link">&#x2190; Back to AI4Teachers</a>
    `;
    return;
  }

  try {
    const res = await fetch('/api/verify-purchase?session_id=' + sessionId);
    const data = await res.json();

    if (!res.ok || !data.success) {
      throw new Error(data.error || 'Purchase verification failed');
    }

    const isBundle = data.product === 'certification-bundle';
    const isSub = data.product === 'monthly-subscription' || data.product === 'annual-subscription';

    let welcomeMsg = 'Your purchase is confirmed!';
    if (isBundle) {
      welcomeMsg = 'Your certification bundle purchase is confirmed! You now have access to all 5 courses.';
    } else if (isSub) {
      welcomeMsg = 'Your subscription is active! You now have access to all courses and content.';
    } else {
      welcomeMsg = 'Your purchase is confirmed! Click the button below to join your course on Google Classroom.';
    }

    // Build course cards
    const courseCards = data.courses.map((course, i) => {
      const icon = Object.entries(COURSE_ICONS).find(([key]) => course.name.toLowerCase().includes(key.replace('course-', 'course ')))
        ? Object.values(COURSE_ICONS)[i] || '&#x1F4D6;'
        : '&#x1F4D6;';

      return `
        <div class="course-card">
          <div class="course-info">
            <div class="course-icon">${icon}</div>
            <div>
              <div class="course-name">${course.name}</div>
              <div class="course-desc">Google Classroom &bull; Self-paced</div>
            </div>
          </div>
          <a href="${course.joinUrl}" class="join-btn" target="_blank" rel="noopener">Join Course &rarr;</a>
        </div>
      `;
    }).join('');

    container.innerHTML = `
      <div class="success-check">&#x2713;</div>
      <h1>Welcome to <em>AI4Teachers</em>!</h1>
      <p class="subtitle">${welcomeMsg}</p>

      <div class="courses-section">
        <h2>&#x1F393; Your Course${data.courses.length > 1 ? 's' : ''}</h2>
        ${courseCards}
      </div>

      <div class="setup-section">
        <h2>&#x1F680; Getting Started</h2>
        <ol class="step-list">
          <li>Click <strong>"Join Course"</strong> above to open Google Classroom</li>
          <li>Sign in with your Google account (any Google account works)</li>
          <li>You'll see all modules, lessons, and assignments in the Classwork tab</li>
          <li>Work at your own pace &mdash; complete modules in order for best results</li>
        </ol>
        <div class="hand-note">&#x261D;&#xFE0F; Each course takes about 6&ndash;8 hours. You've got this!</div>
      </div>

      <div class="email-note">
        <strong>&#x1F4E7; Check your inbox!</strong> We've sent a confirmation to <strong>${data.customer_email || 'your email'}</strong> with your course access links and receipt. Save it for your records.
      </div>

      <a href="/" class="back-link">&#x2190; Back to AI4Teachers</a>
    `;

  } catch (error) {
    container.innerHTML = `
      <div class="success-check" style="background: var(--red);">&#x2717;</div>
      <h1>Something went wrong</h1>
      <div class="error-msg">
        <strong>Error:</strong> ${error.message}<br><br>
        Don't worry &mdash; your payment was processed. Email us at <strong>info@ai4teachers.co</strong> with your receipt and we'll get your course access to you right away.
      </div>
      <a href="/" class="back-link" style="margin-top: 1.5rem;">&#x2190; Back to AI4Teachers</a>
    `;
  }
})();
</script>

</body>
</html>
